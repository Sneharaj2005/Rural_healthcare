services:
  - type: web
    name: sneha-backend
    runtime: python
    region: singapore          # change to your preferred region
    plan: free
    pythonVersion: "3.11.9"
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: LOG_FORMAT
        value: json
      - key: MONGODB_URL
        sync: false            # set manually in Render dashboard
      - key: MONGODB_DB_NAME
        value: rural_health_companion
      - key: SECRET_KEY
        generateValue: true    # Render auto-generates a secure random value
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "10080"
      - key: GEMINI_API_KEY
        sync: false            # set manually in Render dashboard
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: GOOGLE_MAPS_API_KEY
        sync: false            # set manually in Render dashboard
      - key: ALLOWED_ORIGINS
        sync: false            # set to your Vercel URL after deploy
      - key: EMAIL_ENABLED
        value: "false"
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM_NAME
        value: RHC AI Lite
      - key: SMTP_FROM_EMAIL
        sync: false
